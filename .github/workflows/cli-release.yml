name: CLI Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag del release a actualizar (e.g. v0.2.1)'
        required: true

jobs:
  build-cli-exe:
    name: Build skillvault.exe (Windows x64)
    runs-on: ubuntu-latest   # Linux tiene patch, make y toolchain — más rápido que windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci

      - name: Bundle CLI (ESM → CJS)
        working-directory: cli
        run: node build.js

      - name: Build Windows exe with pkg
        working-directory: cli
        run: |
          npx @yao-pkg/pkg dist/skillvault.bundle.cjs \
            --target node20-win-x64 \
            --output dist/skillvault-win-x64.exe

      - name: Verify exe (basic smoke test)
        working-directory: cli
        run: |
          # Smoke test via wine or just check file size
          ls -lh dist/skillvault-win-x64.exe

      - name: Upload exe to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          files: cli/dist/skillvault-win-x64.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
