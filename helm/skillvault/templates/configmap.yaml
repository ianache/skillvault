apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "skillvault.fullname" . }}
  labels:
    {{- include "skillvault.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  AUTH_KEYCLOAK_ID: {{ .Values.auth.keycloak.id | quote }}
  AUTH_KEYCLOAK_ISSUER: {{ .Values.auth.keycloak.issuer | quote }}
{{- if .Values.mysql.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "skillvault.mysql.fullname" . }}-config
  labels:
    {{- include "skillvault.labels" . | nindent 4 }}
data:
  my.cnf: |
    {{- .Values.mysql.config | nindent 4 }}
{{- end }}
