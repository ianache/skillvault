{{- if .Values.mysql.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "skillvault.mysql.fullname" . }}
  labels:
    {{- include "skillvault.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None   # headless: permite que la app resuelva el hostname directamente
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP
      name: mysql
  selector:
    {{- include "skillvault.mysql.selectorLabels" . | nindent 4 }}
{{- end }}
