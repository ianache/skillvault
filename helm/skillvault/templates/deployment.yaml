apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skillvault.fullname" . }}
  labels:
    {{- include "skillvault.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "skillvault.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "skillvault.selectorLabels" . | nindent 8 }}
      annotations:
        # Fuerza rollout al cambiar ConfigMap o Secret
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      initContainers:
        # Waits for the DB (in-cluster or external — host:port parsed from
        # DATABASE_URL) to accept TCP connections before migrating. Needed
        # for both mysql.enabled=true and externalDatabaseUrl cases.
        - name: wait-for-db
          image: busybox:1.36
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "skillvault.fullname" . }}
                  key: DATABASE_URL
          command:
            - sh
            - -c
            - |
              hostport=$(echo "$DATABASE_URL" | sed -E 's#^mysql2?://[^@]*@([^/]+)/.*#\1#')
              host=$(echo "$hostport" | cut -d: -f1)
              port=$(echo "$hostport" | cut -d: -f2)
              port=${port:-3306}
              until nc -z "$host" "$port"; do
                echo "Waiting for DB at $host:$port..."; sleep 3
              done
              echo "DB is reachable."
        # Every MySQL migration script that must run for the schema to be
        # complete — same list as docker-entrypoint.sh's MYSQL_MIGRATIONS,
        # kept in sync deliberately since both run the same image.
        - name: db-migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              node_modules/.bin/tsx src/lib/db/migrate-mysql-init.ts
              node_modules/.bin/tsx src/lib/db/migrate-review-workflow-mysql.ts
              node_modules/.bin/tsx src/lib/db/migrate-users-mysql.ts
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "skillvault.fullname" . }}
                  key: DATABASE_URL

      containers:
        - name: skillvault
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "skillvault.fullname" . }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "skillvault.fullname" . }}
                  key: DATABASE_URL
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "skillvault.fullname" . }}
                  key: AUTH_SECRET
            - name: AUTH_KEYCLOAK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "skillvault.fullname" . }}
                  key: AUTH_KEYCLOAK_SECRET
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
